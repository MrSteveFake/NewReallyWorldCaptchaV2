recaptcha:
  site-key: "YOUR_KEY"
  secret-key: "YOUR_SECRET"
  url-format: "https://captcha.fakeworld.pw/captcha.html?token=${token}"
  timeout-minutes: 5

mysql:
  host: "your-mysql-host.com"
  port: 3306
  database: "limbocaptcha"
  user: "limbocaptcha_user"
  password: "your_password"

settings:
  target-server: "lobby"

messages:
  captcha-message: "&eПройдите проверку:"
  success-message: "&aДобро пожаловать!"
  kick-message: "&cВремя истекло!"
  fail-kick-message: "&cПодозрительная активность! Бан 5 мин."
