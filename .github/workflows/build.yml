name: Build LimboCaptcha

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Create directories
      run: |
        mkdir -p libs
        mkdir -p build
    
    - name: Download dependencies
      run: |
        # Velocity API
        wget -q -O libs/velocity-api.jar https://repo.papermc.io/repository/maven-public/com/velocitypowered/velocity-api/3.4.0/velocity-api-3.4.0.jar
        
        # Guava (ОБЯЗАТЕЛЬНО!)
        wget -q -O libs/guava.jar https://repo1.maven.org/maven2/com/google/guava/guava/33.0.0-jre/guava-33.0.0-jre.jar
        
        # Adventure API
        wget -q -O libs/adventure-api.jar https://repo1.maven.org/maven2/net/kyori/adventure-api/4.16.0/adventure-api-4.16.0.jar
        wget -q -O libs/adventure-legacy.jar https://repo1.maven.org/maven2/net/kyori/adventure-text-serializer-legacy/4.16.0/adventure-text-serializer-legacy-4.16.0.jar
        
        # SLF4J
        wget -q -O libs/slf4j-api.jar https://repo1.maven.org/maven2/org/slf4j/slf4j-api/2.0.9/slf4j-api-2.0.9.jar
        
        # Configurate (для YAML)
        wget -q -O libs/configurate-core.jar https://repo1.maven.org/maven2/org/spongepowered/configurate-core/4.1.2/configurate-core-4.1.2.jar
        wget -q -O libs/configurate-yaml.jar https://repo1.maven.org/maven2/org/spongepowered/configurate-yaml/4.1.2/configurate-yaml-4.1.2.jar
        
        # SnakeYAML
        wget -q -O libs/snakeyaml.jar https://repo1.maven.org/maven2/org/yaml/snakeyaml/2.2/snakeyaml-2.2.jar
        
        # Checker Qual (нужен Guava)
        wget -q -O libs/checker-qual.jar https://repo1.maven.org/maven2/org/checkerframework/checker-qual/3.41.0/checker-qual-3.41.0.jar
        
        # FailureAccess (нужен Guava)
        wget -q -O libs/failureaccess.jar https://repo1.maven.org/maven2/com/google/guava/failureaccess/1.0.2/failureaccess-1.0.2.jar
        
        echo "Все библиотеки скачаны:"
        ls -la libs/
    
    - name: Compile Java
      run: |
        CLASSPATH=""
        for jar in libs/*.jar; do
          CLASSPATH="$CLASSPATH:$jar"
        done
        
        find . -name "*.java" -type f > sources.txt
        echo "Компилируемые файлы:"
        cat sources.txt
        
        javac -d build -cp "${CLASSPATH#:}" @sources.txt
        echo "Компиляция завершена!"
    
    - name: Copy resources
      run: |
        PLUGIN_JSON=$(find . -name "velocity-plugin.json" -type f)
        CONFIG_YML=$(find . -name "config.yml" -type f)
        cp "$PLUGIN_JSON" build/
        cp "$CONFIG_YML" build/
        echo "Ресурсы скопированы"
    
    - name: Create fat JAR
      run: |
        # Распаковываем все библиотеки
        mkdir -p build/merged
        cd build/merged
        
        for jar in ../../libs/*.jar; do
          jar xf "$jar"
        done
        
        # Добавляем скомпилированный код
        cp -r ../com ../config.yml ../velocity-plugin.json . 2>/dev/null
        
        # Удаляем конфликты
        rm -rf META-INF
        rm -f module-info.class
        
        # Создаем финальный JAR
        jar cf ../LimboCaptcha.jar *
        cd ../..
        
        echo "JAR создан!"
        ls -lh build/LimboCaptcha.jar
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: LimboCaptcha
        path: build/LimboCaptcha.jar
        retention-days: 90
