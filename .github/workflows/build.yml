name: Build LimboCaptcha

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Create directories
      run: |
        mkdir -p libs
        mkdir -p build
    
    - name: Download dependencies
      run: |
        # Velocity API
        wget -q -O libs/velocity-api.jar https://repo.papermc.io/repository/maven-public/com/velocitypowered/velocity-api/3.4.0/velocity-api-3.4.0.jar
        
        # Guice (ОБЯЗАТЕЛЬНО для @Inject)
        wget -q -O libs/guice.jar https://repo1.maven.org/maven2/com/google/inject/guice/7.0.0/guice-7.0.0.jar
        
        # Jakarta Inject (нужен Guice)
        wget -q -O libs/jakarta-inject.jar https://repo1.maven.org/maven2/jakarta/inject/jakarta.inject-api/2.0.1/jakarta.inject-api-2.0.1.jar
        
        # AOP Alliance (нужен Guice)
        wget -q -O libs/aopalliance.jar https://repo1.maven.org/maven2/aopalliance/aopalliance/1.0/aopalliance-1.0.jar
        
        # Gson
        wget -q -O libs/gson.jar https://repo1.maven.org/maven2/com/google/code/gson/gson/2.10.1/gson-2.10.1.jar
        
        # Guava
        wget -q -O libs/guava.jar https://repo1.maven.org/maven2/com/google/guava/guava/33.0.0-jre/guava-33.0.0-jre.jar
        
        # Adventure
        wget -q -O libs/adventure-api.jar https://repo1.maven.org/maven2/net/kyori/adventure-api/4.16.0/adventure-api-4.16.0.jar
        wget -q -O libs/adventure-key.jar https://repo1.maven.org/maven2/net/kyori/adventure-key/4.16.0/adventure-key-4.16.0.jar
        wget -q -O libs/examination-api.jar https://repo1.maven.org/maven2/net/kyori/examination-api/1.3.0/examination-api-1.3.0.jar
        wget -q -O libs/adventure-legacy.jar https://repo1.maven.org/maven2/net/kyori/adventure-text-serializer-legacy/4.16.0/adventure-text-serializer-legacy-4.16.0.jar
        
        # SLF4J
        wget -q -O libs/slf4j-api.jar https://repo1.maven.org/maven2/org/slf4j/slf4j-api/2.0.9/slf4j-api-2.0.9.jar
        
        # Others
        wget -q -O libs/checker-qual.jar https://repo1.maven.org/maven2/org/checkerframework/checker-qual/3.41.0/checker-qual-3.41.0.jar
        wget -q -O libs/failureaccess.jar https://repo1.maven.org/maven2/com/google/guava/failureaccess/1.0.2/failureaccess-1.0.2.jar
        wget -q -O libs/error-prone-annotations.jar https://repo1.maven.org/maven2/com/google/errorprone/error_prone_annotations/2.23.0/error_prone_annotations-2.23.0.jar
        wget -q -O libs/jsr305.jar https://repo1.maven.org/maven2/com/google/code/findbugs/jsr305/3.0.2/jsr305-3.0.2.jar
        
        echo "OK"
    
    - name: Compile Java
      run: |
        CLASSPATH=""
        for jar in libs/*.jar; do
          CLASSPATH="$CLASSPATH:$jar"
        done
        find . -name "*.java" -type f > sources.txt
        javac -d build -cp "${CLASSPATH#:}" @sources.txt
        echo "OK"
    
    - name: Copy resources
      run: |
        find . -name "velocity-plugin.json" -type f -exec cp {} build/ \;
        find . -name "config.yml" -type f -exec cp {} build/ \;
        echo "OK"
    
    - name: Create fat JAR
      run: |
        mkdir -p build/merged
        cd build/merged
        for jar in ../../libs/*.jar; do
          jar xf "$jar" 2>/dev/null
        done
        cp -r ../com . 2>/dev/null
        cp ../velocity-plugin.json . 2>/dev/null
        cp ../config.yml . 2>/dev/null
        rm -rf META-INF
        rm -f module-info.class
        jar cf ../LimboCaptcha.jar *
        cd ../..
        echo "OK"
        ls -lh build/LimboCaptcha.jar
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: LimboCaptcha
        path: build/LimboCaptcha.jar
        retention-days: 90
